services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: db2_proyecto2_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-proyecto2}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-proyecto2}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
